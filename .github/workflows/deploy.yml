name: Deploy — Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      setup_bq:
        description: "Run BigQuery table setup"
        required: false
        default: false
        type: boolean
      image_tag:
        description: "Docker image tag (defaults to latest main SHA)"
        required: false
        type: string

env:
  GCP_REGION: us-central1
  IMAGE_NAME: video-moments-rag

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup BigQuery tables
        if: ${{ inputs.setup_bq }}
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ env.GCP_REGION }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          BQ_DATASET: ${{ secrets.BQ_DATASET || 'moments' }}
          BQ_MOMENTS_TABLE: ${{ secrets.BQ_MOMENTS_TABLE || 'moments' }}
        run: python scripts/setup_bq.py

      - name: Resolve image tag
        id: image
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          FULL="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/docker/${{ env.IMAGE_NAME }}:${TAG}"
          echo "full_tag=$FULL" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.IMAGE_NAME }} \
            --image "${{ steps.image.outputs.full_tag }}" \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --platform managed \
            --no-traffic \
            --tag ${{ inputs.environment }}

      - name: Run post-deploy smoke test
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ env.GCP_REGION }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          BQ_DATASET: ${{ secrets.BQ_DATASET || 'moments' }}
          BQ_MOMENTS_TABLE: ${{ secrets.BQ_MOMENTS_TABLE || 'moments' }}
        run: python scripts/smoke_test.py

      - name: Route traffic (production only)
        if: ${{ inputs.environment == 'production' }}
        run: |
          gcloud run services update-traffic ${{ env.IMAGE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --to-latest
