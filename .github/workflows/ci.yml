name: CI — Lint & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Check formatting
        run: ruff format --check .

      - name: Check lint rules
        run: ruff check .

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --tb=short --cov=src --cov-report=term-missing

      - name: Verify critical imports
        run: |
          python -c "from src.vector_store import VectorStore; print('vector_store OK')"
          python -c "from src.extractor import MomentExtractor; print('extractor OK')"
          python -c "from src.agent.tools import retrieve_moments, get_clip_url; print('agent tools OK')"
          python -c "from src.embedder import Embedder, moment_to_text; print('embedder OK')"
